<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>图印工坊 - 图片文字批量生成</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-content">
        <div class="brand">
          <span class="brand-mark">PM</span>
          <div>
            <h1>图印工坊</h1>
            <p class="tagline">PicMark Studio · 图片文字批量生成工具</p>
          </div>
        </div>
        <p class="hero-desc">上传底图，标记文字位置，导入名单，一键生成批量个性化图片。</p>
      </div>
    </header>

    <main class="container">
      <!-- 步骤1：上传底图 -->
      <section class="card">
        <div class="step-title">
          <span class="step-num">1</span>
          <h2>上传底图</h2>
        </div>
        <label class="drop-zone" id="dropZone">
          <input type="file" id="templateInput" accept="image/*" hidden>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <path d="M21 15l-5-5L5 21"></path>
          </svg>
          <span class="drop-title">点击或拖拽图片至此</span>
          <span class="drop-sub">支持 JPG、PNG、WebP</span>
        </label>
        <div id="imageInfo" class="file-info"></div>
      </section>

      <!-- 步骤2：点击定位 / 取色 -->
      <section class="card">
        <div class="step-title">
          <span class="step-num">2</span>
          <h2>定位与取色</h2>
        </div>
        <div class="mode-switch">
          <button type="button" class="mode-btn active" data-mode="position">
            <span class="dot"></span>定位
          </button>
          <button type="button" class="mode-btn" data-mode="pick">
            <span class="dot"></span>取色
          </button>
          <div class="color-badge" title="当前文字颜色">
            <span id="pickedColor" class="color-swatch"></span>
            <span id="colorValue" class="color-value">#C89B5C</span>
          </div>
        </div>
        <p class="hint" id="modeHint">点击图片，"定位位置"文字即为最终文字左对齐起始位置的实时预览</p>
        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="previewCanvas"></canvas>
          <div id="marker" class="marker">定位位置</div>
        </div>
        <div class="form-row compact">
          <label class="coord">X<input type="number" id="posX" value="540"></label>
          <label class="coord">Y<input type="number" id="posY" value="640"></label>
        </div>
      </section>

      <!-- 步骤3：文字样式 -->
      <section class="card">
        <div class="step-title">
          <span class="step-num">3</span>
          <h2>文字样式</h2>
        </div>
        <div class="form-grid">
          <label class="field">字号
            <input type="number" id="fontSize" value="60" min="12" max="300">
          </label>
          <label class="field">颜色
            <input type="color" id="fontColor" value="#C89B5C">
          </label>
          <label class="field">对齐
            <select id="textAlign">
              <option value="left">左对齐</option>
              <option value="center" selected>居中</option>
              <option value="right">右对齐</option>
            </select>
          </label>
          <label class="field">最大宽度
            <input type="number" id="maxWidth" value="400" min="0" placeholder="px">
          </label>
          <label class="field">字重
            <select id="fontWeight">
              <option value="10">10 · Hairline</option>
              <option value="100">100 · Thin</option>
              <option value="200">200 · Extra Light</option>
              <option value="300">300 · Light</option>
              <option value="400" selected>400 · Normal</option>
              <option value="500">500 · Medium</option>
              <option value="600">600 · Semi Bold</option>
              <option value="700">700 · Bold</option>
              <option value="800">800 · Extra Bold</option>
              <option value="900">900 · Black</option>
            </select>
          </label>
          <label class="field full">字体
            <select id="fontFamily">
              <optgroup label="中文字体">
                <option value="Microsoft YaHei, sans-serif">微软雅黑</option>
                <option value="PingFang SC, Microsoft YaHei, sans-serif">苹方</option>
                <option value="SimHei, Microsoft YaHei, sans-serif">黑体</option>
                <option value="SimSun, Songti SC, serif">宋体</option>
                <option value="KaiTi, Kaiti SC, serif">楷体</option>
                <option value="FangSong, STFangsong, serif">仿宋</option>
                <option value="YouYuan, Yuanti SC, sans-serif">幼圆</option>
                <option value="STHeiti, Heiti SC, sans-serif">华文黑体</option>
                <option value="STKaiti, Kaiti SC, serif">华文楷体</option>
                <option value="STLiti, LiSu, serif">华文隶书</option>
                <option value="STXingkai, Xingkai SC, cursive">华文行楷</option>
              </optgroup>
              <optgroup label="英文字体">
                <option value="Arial, sans-serif">Arial</option>
                <option value="Helvetica, Arial, sans-serif">Helvetica</option>
                <option value="Georgia, Times New Roman, serif">Georgia</option>
                <option value="Times New Roman, Times, serif">Times New Roman</option>
                <option value="Verdana, sans-serif">Verdana</option>
                <option value="Tahoma, sans-serif">Tahoma</option>
                <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
                <option value="Courier New, monospace">Courier New</option>
                <option value="Impact, sans-serif">Impact</option>
                <option value="Comic Sans MS, cursive">Comic Sans MS</option>
              </optgroup>
              <optgroup label="其他">
                <option value="sans-serif">系统默认</option>
                <option value="custom">自定义字体</option>
              </optgroup>
            </select>
          </label>
          <label class="field full custom-font" style="display:none;">
            <input type="file" id="fontInput" accept=".ttf,.otf,.ttc,.woff,.woff2" hidden>
            <span class="secondary-btn">上传字体文件</span>
            <span id="fontName" class="file-info"></span>
          </label>
        </div>
      </section>

      <!-- 步骤4：名单 -->
      <section class="card">
        <div class="step-title">
          <span class="step-num">4</span>
          <h2>导入名单</h2>
        </div>
        <p class="hint">每行一个名字；也可直接上传 .txt 或 .csv 文件</p>
        <textarea id="namesInput" rows="5" placeholder="张三&#10;李四&#10;王五"></textarea>
        <label class="secondary-btn">
          <input type="file" id="namesFileInput" accept=".txt,.csv" hidden>
          <span>上传名单文件</span>
        </label>
      </section>

      <!-- 步骤5：生成 -->
      <section class="card">
        <div class="step-title">
          <span class="step-num">5</span>
          <h2>批量生成</h2>
        </div>
        <div class="progress" id="progressBox" style="display:none;">
          <div class="progress-bar" id="progressBar"><div class="progress-bar-fill" id="progressBarFill"></div></div>
          <span id="progressText">0%</span>
        </div>
        <button id="generateBtn" class="primary-btn" disabled>开始生成并下载</button>
        <div id="previewList" class="preview-list"></div>
      </section>
    </main>

    <footer class="footer">
      <p>图印工坊 · 让批量图片制作更简单</p>
      <p class="signature">by XanthanL</p>
    </footer>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="lib/FileSaver.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
